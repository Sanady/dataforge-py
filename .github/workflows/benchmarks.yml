name: Benchmarks

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  benchmark:
    name: Performance benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"

      - name: Restore uv cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/uv
          key: uv-bench-${{ hashFiles('uv.lock') }}
          restore-keys: uv-bench-

      - name: Install dependencies
        run: uv sync --group dev

      - name: Download previous benchmark baseline
        uses: actions/download-artifact@v8
        with:
          name: benchmark-baseline
          path: baseline/
        continue-on-error: true

      - name: Run benchmarks
        run: uv run python benchmark.py --save latest.json --compare baseline/latest.json

      - name: Upload benchmark results as new baseline
        if: always()
        uses: actions/upload-artifact@v8
        with:
          name: benchmark-baseline
          path: latest.json
          retention-days: 90
          overwrite: true

      - name: Upload benchmark results (per-commit archive)
        if: always()
        uses: actions/upload-artifact@v8
        with:
          name: benchmark-results-${{ github.sha }}
          path: latest.json
          retention-days: 30

