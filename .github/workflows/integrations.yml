name: Integration Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integrations:
    name: Integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"

      - name: Restore uv cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-integrations-${{ hashFiles('uv.lock') }}
          restore-keys: uv-integrations-

      - name: Install dependencies
        run: uv sync --group dev

      - name: Install optional integration dependencies
        run: uv pip install polars pyarrow pydantic sqlalchemy

      - name: Run integration tests
        run: uv run pytest tests/test_integrations.py -v --tb=short
